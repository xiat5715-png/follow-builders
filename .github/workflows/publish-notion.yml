name: Publish Digest to Notion

on:
  schedule:
    # Primary 08:07 and backup 09:07 Asia/Shanghai. Existing-page checks make
    # the backup exit before fetching feeds or calling DeepSeek.
    - cron: '7 0,1 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate Chinese digest and publish to Notion
        working-directory: scripts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
        run: npm run publish-notion
