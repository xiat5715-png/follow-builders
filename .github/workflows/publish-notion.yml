name: Publish Digest to Notion

on:
  schedule:
    # Retry window: 08:07-10:07 Asia/Shanghai. Existing-page checks make
    # later runs exit before fetching feeds or calling DeepSeek.
    - cron: '7,37 0,1,2 * * *'
  workflow_dispatch:
    inputs:
      force_create:
        description: Create a new page even if today's digest already exists
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Generate Chinese digest and publish to Notion
        working-directory: scripts
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          FORCE_NOTION_CREATE: ${{ inputs.force_create || 'false' }}
        run: npm run publish-notion
